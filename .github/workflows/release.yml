name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch|minor|major) or an explicit semver (e.g. 1.2.3)'
        required: true
        default: patch
        type: string

# contents: write  -> push the version-bump commit and tag back to the repo
# id-token: write  -> mint the OIDC token npm Trusted Publishing verifies (no NPM_TOKEN)
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted Publishing / OIDC provenance requires npm >= 11.5.1; the npm bundled with
      # Node 24 can be below that, so upgrade it. Pin to the 11.x line rather than npm@latest:
      # npm@12 requires Node >= 22.22.2/24.15.0, and @latest is a moving target, so a pin is
      # deterministic and 11.x satisfies the >= 11.5.1 requirement.
      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check licenses (fails on AGPL/GPL)
        run: npm run licenses:check

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit and tag
        run: |
          npm version "${{ inputs.version }}" -m "chore(release): %s"

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Publish to npm (OIDC Trusted Publishing, with provenance)
        run: npm publish --provenance
